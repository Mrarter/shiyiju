# nginx 反向代理配置 - HTTPS 到 HTTP
# 将 HTTPS 请求代理到后端 Spring Boot (HTTP 8080)

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # HTTP 重定向到 HTTPS
    server {
        listen 8081;
        server_name 192.168.1.163;
        
        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    # HTTPS 服务器
    server {
        listen 8443 ssl;
        server_name 192.168.1.163;

        # SSL 证书配置
        ssl_certificate      /Users/master/Desktop/shiyiju/nginx/ssl.crt;
        ssl_certificate_key  /Users/master/Desktop/shiyiju/nginx/ssl.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;

        # 代理 API 请求到后端
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时设置
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # 静态资源（图片等）
        location /uploads/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_cache off;
        }
    }
}
