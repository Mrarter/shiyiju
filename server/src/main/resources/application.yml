spring:
  application:
    name: shiyiju-server
  datasource:
    # 支持 Railway 的 DATABASE_URL 环境变量（格式: mysql://user:pass@host:port/dbname）
    # 如果没有 DATABASE_URL，则使用本地配置
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:shiyiju}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:shiyiju}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.shiyiju.modules.user.entity,com.shiyiju.modules.artist.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  tomcat:
    max-swallow-size: 100MB

app:
  jwt:
    secret: ${JWT_SECRET:shiyiju-official-backend-secret-2026}
    expiration-seconds: ${JWT_EXPIRE_SECONDS:604800}
  wechat:
    miniapp-app-id: ${WECHAT_MINIAPP_APP_ID:wx-miniapp-demo}
    miniapp-app-secret: ${WECHAT_MINIAPP_APP_SECRET:}
    code2-session-url: ${WECHAT_CODE2SESSION_URL:https://api.weixin.qq.com/sns/jscode2session}
    mock-enabled: ${WECHAT_MOCK_ENABLED:true}

# 图片服务基础URL（小程序访问用）
image:
  base-url: ${IMAGE_BASE_URL:}
